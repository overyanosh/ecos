# === ecos Update Policy ===
# Les mises à jour sont pilotées par la distribution, pas par l'utilisateur
# bootc gère les updates atomiques via container image pulls

# Auto-update timer désactivé — les updates se font via CI/CD
# qui pousse une nouvelle image et bootc upgrade au prochain reboot
[Policy]
AutoUpdate=false
NotifyUpdates=true

# Quand une update est disponible, la web UI (phase 2) affiche une notification
# L'administrateur peut planifier le reboot (la seule action utilisateur)