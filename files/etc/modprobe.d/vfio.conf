# === ecos GPU Passthrough Configuration ===

# Activer le mode unsafe interrupts (nécessaire sur certains chipsets AMD)
options vfio_iommu_type1 allow_unsafe_interrupts=1

# Disable VFIO anti-collision protection (pour binding manuel)
options vfio_pci ids=0000:0000

# Charger les drivers VFIO AVANT les drivers natifs
softdep nvidia pre: vfio-pci
softdep nouveau pre: vfio-pci
softdep amdgpu pre: vfio-pci
softdep radeon pre: vfio-pci