name: Build ecos Image

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}
  IMAGE_NAME: ecos    # ⬅️ Toujours en minuscules pour GHCR
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build -t ecos:latest -f container/Containerfile .

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | podman login ghcr.io \
            -u ${{ github.actor }} --password-stdin

      - name: Tag and Push image
        env:
          IMAGE_URL: "ghcr.io/${{ github.repository_owner }}/ecos:${{ env.IMAGE_TAG }}"
        run: |
          podman tag ecos:latest "$IMAGE_URL"
          podman push "$IMAGE_URL"

      - name: Build bootable disk image (if needed)
        run: |
          sudo apt-get install -y bootc-image-builder || true
          sudo bootc-image-builder \
            --type disk \
            --output ./output/ecos-x86_64.raw \
            --arch x86_64 \
            "ghcr.io/${{ github.repository_owner }}/ecos:${{ env.IMAGE_TAG }}" || \
            echo "[WARN] bootc-image-builder not available or failed"

      - name: Compress image
        run: |
          if [[ -f ./output/ecos-x86_64.raw ]]; then
            xz -v -T0 ./output/ecos-x86_64.raw
          else
            echo "[INFO] No disk image to compress"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecos-usb-image
          path: ./output/*.raw*
          retention-days: 30
          if-no-files-found: warn