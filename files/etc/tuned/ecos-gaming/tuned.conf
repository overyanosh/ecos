# === ecos Gaming Profile ===
# Optimisé pour hôte de virtualisation gaming multi-GPU

[main]
summary=Gaming VM host optimized profile

[cpu]
# Performance governor — pas de scaling dynamique
governor=performance
energy_perf_preference=performance

[vm]
# Transparent hugepages
transparent_hugepages=always

[sysctl]
# Augmente les pages pour VRAM mapping
vm.nr_hugepages = 2048

# I/O scheduler pour NVMe/SSD
block_schedule = none

[[udev]]
# NVMe = scheduler 'none' (le hardware gère mieux)
match = "NVMe"
action = "add"
script = "${VARIABLES:/usr/lib/tuned/ecos-gaming/nvme-scheduler.sh}"

[scsi_host]
# ALPM désactivé pour latence minimale
alpm = min_power_off