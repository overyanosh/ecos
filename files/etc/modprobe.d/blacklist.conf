# === ecos — Blacklist des drivers GPU natifs ===
# Empêche l'hôte de capturer les GPU destinés au passthrough
blacklist nouveau
blacklist nvidia
blacklist nvidia-drm
blacklist nvidia-modeset
blacklist nvidia-uvm
blacklist radeon
blacklist amdgpu

# Note: le binding VFIO se fait dynamiquement via ecos-prepare-gpu.sh
# lors du firstboot, selon le nombre de GPU détectés