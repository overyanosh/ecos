# === ecOS SSH Configuration ===

# Pas de login root
PermitRootLogin no

# Clés ET mots de passe (mots de passe temporaires au firstboot)
PasswordAuthentication yes
PubkeyAuthentication yes

# Utilisateurs autorisés
AllowUsers ecos-admin

# Forwarding
AllowTcpForwarding yes
X11Forwarding no

# Sécurité
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# Pas de mots de passe vides
PermitEmptyPasswords no