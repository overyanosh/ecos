# === ecos Kernel tuning — Virtualisation gaming ===

# Mémoire pour VM — ne swappe jamais si possible
vm.swappiness = 1
vm.overcommit_memory = 1
vm.max_map_count = 2147483647

# Réseau — bridge pour VM
net.ipv4.ip_forward = 1
net.ipv4.conf.all.forwarding = 1
net.bridge.bridge-nf-call-iptables = 0

# IOMMU est géré au niveau kernel cmdline, pas ici
# Mais on optimise l'I/O :
vm.dirty_ratio = 5
vm.dirty_background_ratio = 1

# Hugepages seront configurées dynamiquement par tuned