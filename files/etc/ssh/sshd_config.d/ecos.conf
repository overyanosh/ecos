# === ecOS SSH Configuration ===

# Pas de login root
PermitRootLogin no

# Clés uniquement par défaut (mot de passe désactivé)
PasswordAuthentication no
PubkeyAuthentication yes

# Utilisateurs autorisés (sera peuplé au firstboot)
# AllowUsers ecos-admin

# Forwarding
AllowTcpForwarding yes
X11Forwarding no

# Sécurité
MaxAuthTries 3
LoginGraceTime 30
ClientAliveInterval 300
ClientAliveCountMax 2

# Délai avant déconnexion si pas de clé → connexion rapide
PermitEmptyPasswords no