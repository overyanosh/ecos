# === ecOS iSCSI Initiator Configuration ===

# Discovery settings
discovery.sendtargets.iscsi.MaxRecvDataSegmentLength = 32768

# CHAP authentication (désactivé par défaut, activé par cible)
node.session.auth.authmethod = None
# node.session.auth.username =
# node.session.auth.password =
# node.session.auth.username_in =
# node.session.auth.password_in =

# Timeout settings optimisés pour gaming/VM
node.session.timeo.replacement_timeout = 120
node.conn[0].timeo.login_timeout = 15
node.conn[0].timeo.logout_timeout = 15
node.conn[0].timeo.noop_out_interval = 5
node.conn[0].timeo.noop_out_timeout = 5

# Performance — éteindre immédiatement au shutdown
node.session.err_timeo.abort_timeout = 15
node.session.err_timeo.lu_reset_timeout = 30
node.session.err_timeo.tgt_reset_timeout = 30

# TCP settings
node.conn[0].tcp.window_size = 512K
node.conn[0].tcp.tcp_wrt_disable = No

# Multipath-friendly
node.session.multiple_sessions = Yes